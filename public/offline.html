<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IWAK offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #f7f6f3;
        color: #111;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(360px, 100%);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        letter-spacing: 0.22em;
      }
      p {
        margin: 0 0 22px;
        color: #777;
        font-size: 14px;
        line-height: 1.5;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 22px;
        background: #111;
        color: #fff;
        border-radius: 999px;
        text-decoration: none;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>IWAK</h1>
      <p>Нет соединения. Как только интернет вернётся, каталог снова откроется.</p>
      <a href="/catalog">Обновить</a>
    </main>
  </body>
</html>
